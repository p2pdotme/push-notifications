name: Release

# release-please opens/maintains a release PR for @p2pdotme/push-client (the
# client/ package). Merging it tags + creates the GitHub Release, which triggers
# the OIDC trusted publish to public npm (provenance automatic). Mirrors the
# widgets repo pipeline; adapted for the client/ subpackage. The server is NOT
# published (it is deployed).

on:
  push:
    branches: [main]

permissions: {}            # least privilege; each job opts in to what it needs

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # tag + create the GitHub Release
      pull-requests: write    # open / update the release PR
    outputs:
      release_created: ${{ steps.release.outputs['client--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # config-file (release-please-config.json) and manifest-file
          # (.release-please-manifest.json) use the default names.

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write          # OIDC token for npm trusted publishing
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'                      # >= 22.14.0 covers OIDC trusted publishing
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@^11.5.1            # >= 11.5.1 for OIDC; ^ pins below the next major

      - run: npm ci

      - run: npm run build

      - name: Publish to npm (OIDC + provenance)
        run: |
          v=$(node -p "require('./package.json').version")
          if [[ "$v" == *-* ]]; then tag="${v#*-}"; tag="${tag%%.*}"; else tag="latest"; fi
          npm publish --access public --tag "$tag"   # provenance is automatic under trusted publishing
