name: Publish client to GitHub Packages

# Publishes @p2pdotme/push-client (the browser SDK) privately to GitHub
# Packages. Access is governed by the repository/org permissions: only users
# with read access to this repo can install it. Triggered by publishing a
# GitHub Release (tag), or manually from the Actions tab.
#
# The server (@p2pdotme/push-notifications) is NOT published — it is deployed
# (Railway/Netlify), not installed via npm.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@p2pdotme'

      - run: npm install

      - run: npm run build

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
