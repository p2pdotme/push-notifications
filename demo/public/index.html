<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Push Demo</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="theme-color" content="#0b1220" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(1200px 600px at 50% -10%, #1b2a4a, #0b1220);
        color: #e7eefc; padding: 24px;
      }
      main { width: 100%; max-width: 440px; }
      .card {
        background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px; padding: 24px; backdrop-filter: blur(6px);
      }
      h1 { font-size: 22px; margin: 0 0 4px; display: flex; align-items: center; gap: 10px; }
      h1 img { width: 28px; height: 28px; }
      p.sub { margin: 0 0 20px; color: #9fb0d0; font-size: 14px; }
      label { display: block; font-size: 12px; color: #9fb0d0; margin: 14px 0 6px; }
      input {
        width: 100%; padding: 10px 12px; border-radius: 10px; font-size: 15px;
        background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.12); color: #e7eefc;
      }
      button {
        width: 100%; padding: 12px 14px; margin-top: 12px; border-radius: 10px; font-size: 15px;
        font-weight: 600; cursor: pointer; border: 0; transition: opacity .15s, transform .05s;
      }
      button:active { transform: translateY(1px); }
      button:disabled { opacity: .5; cursor: not-allowed; }
      .primary { background: #3b82f6; color: #fff; }
      .ghost { background: rgba(255,255,255,0.08); color: #e7eefc; }
      .row { display: flex; gap: 12px; }
      .row button { margin-top: 0; }
      .status {
        margin-top: 18px; font-size: 13px; min-height: 18px; word-break: break-word;
        color: #9fb0d0;
      }
      .status.ok { color: #6ee7b7; }
      .status.err { color: #fca5a5; }
      .uid { font-size: 11px; color: #66789c; margin-top: 16px; word-break: break-all; }
      hr { border: 0; border-top: 1px solid rgba(255,255,255,0.08); margin: 20px 0; }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <h1><img src="/icon.svg" alt="" /> Push Demo</h1>
        <p class="sub">Suscríbete y dispara una notificación web push real.</p>

        <button id="enable" class="primary">Activar notificaciones</button>

        <hr />

        <label for="title">Título</label>
        <input id="title" value="¡Hola desde demo.lmao.cl!" />
        <label for="body">Mensaje</label>
        <input id="body" value="Tu notificación de prueba llegó 🎉" />

        <div class="row" style="margin-top:14px;">
          <button id="send" class="primary" disabled>Enviar a este dispositivo</button>
          <button id="broadcast" class="ghost" disabled>Broadcast a todos</button>
        </div>

        <div id="status" class="status"></div>
        <div id="uid" class="uid"></div>
      </div>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
